<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>人格契合度匹配</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
body{
background:linear-gradient(135deg,#1a1a2e,#2c2c54);
color:white;display:flex;justify-content:center;align-items:center;
min-height:100vh;padding:20px;
}
.box{
background:rgba(255,255,255,0.08);backdrop-filter:blur(10px);
padding:50px 35px;border-radius:24px;width:100%;max-width:550px;
text-align:center;animation:fadeIn 1s;
}
input{
width:100%;padding:16px;margin:10px 0;border-radius:14px;border:none;
text-align:center;font-size:16px;
}
.btn{
background:linear-gradient(90deg,#4facfe,#00f2fe);
color:white;border:none;padding:16px 24px;
border-radius:14px;width:100%;margin:10px 0;cursor:pointer;
}
#result{margin-top:20px;font-size:18px;color:#fff}
</style>
</head>
<body>
<div class="box">
<h2>人格契合度匹配</h2>
<input placeholder="输入你的人格代码（如SRLPCB）" id="a">
<input placeholder="输入对方人格代码" id="b">
<button class="btn" onclick="check()">计算契合度</button>
<div id="result"></div>
<br>
<button class="btn" onclick="location.href='index.html'">返回首页</button>
</div>

<script>
function check(){
const a=document.getElementById("a").value;
const b=document.getElementById("b").value;
const score=Math.floor(Math.random()*30)+70;
document.getElementById("result").innerText=`契合度：${score}%`;
}
</script>
</body>
</html>
